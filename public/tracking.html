<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>สถานะการยืม-คืน - BORROW SYSTEM</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/index.css" />
    <style>
      /* สไตล์ตารางแบบเดียวกับ History แต่เพิ่มปุ่ม */
      table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        margin-top: 20px;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
      }
      th {
        background-color: #f8f9fa;
        color: #333;
        font-weight: 600;
        padding: 15px;
        text-align: left;
        border-bottom: 2px solid #ddd;
      }
      td {
        padding: 15px;
        border-bottom: 1px solid #eee;
        vertical-align: middle;
        color: #555;
      }
      tr:hover {
        background-color: #f9f9f9;
      }

      /* ปุ่มคืนของ */
      .btn-return {
        background: #e74c3c;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 500;
        transition: 0.2s;
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .btn-return:hover {
        background: #c0392b;
        transform: translateY(-2px);
      }

      /* Badge สถานะ */
      .badge {
        padding: 5px 10px;
        border-radius: 15px;
        font-size: 12px;
        font-weight: 600;
        display: inline-block;
      }
      .bg-warning {
        background: #fff3cd;
        color: #856404;
      } /* รออนุมัติ */
      .bg-info {
        background: #cce5ff;
        color: #004085;
      } /* กำลังใช้งาน */
      .bg-danger {
        background: #f8d7da;
        color: #721c24;
      } /* ไม่อนุมัติ */
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand-title">BORROW SYSTEM</div>
      <ul class="menu-list">
        <li><a href="/dashboard" class="menu-item">🏠 หน้าหลัก</a></li>
        <li>
          <a href="/tracking" class="menu-item active">📦 สถานะการยืม-คืน</a>
        </li>
        <li><a href="/history" class="menu-item">📜 ประวัติทั้งหมด</a></li>
        <li><a href="/category" class="menu-item">📂 หมวดหมู่สินค้า</a></li>
        <li><a href="/product" class="menu-item">🛍️ สินค้า</a></li>
        <li><a href="/others" class="menu-item">... อื่นๆ</a></li>
      </ul>
      <a href="/logout" class="menu-item logout-link">ออกจากระบบ</a>
    </aside>

    <main class="main-content">
      <header class="header-bar">
        <div>
          <h1 class="page-title">สถานะการยืม-คืน</h1>
          <p style="color: #666; font-size: 14px">
            รายการอุปกรณ์ที่อยู่กับคุณในขณะนี้
          </p>
        </div>

        <a href="/profile" class="profile-link">
          <div class="user-profile">
            <span class="user-name" id="user-name">Loading...</span>
            <img
              src="/static/default.png"
              class="avatar"
              id="header-avatar"
              style="
                width: 40px;
                height: 40px;
                border-radius: 50%;
                object-fit: cover;
                margin-left: 10px;
              "
            />
          </div>
        </a>
      </header>

      <div
        style="
          background: white;
          border-radius: 10px;
          padding: 20px;
          margin-top: 20px;
        "
      >
        <table>
          <thead>
            <tr>
              <th width="80">รูป</th>
              <th>อุปกรณ์</th>
              <th>วันที่ยืม</th>
              <th>กำหนดส่ง</th>
              <th>สถานะ</th>
              <th width="100">จัดการ</th>
            </tr>
          </thead>
          <tbody id="active-list">
            <tr>
              <td colspan="6" align="center">กำลังโหลดข้อมูล...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        loadUserProfile();
        loadActiveItems();
      });

      function loadUserProfile() {
        fetch("/api/user")
          .then((res) => res.json())
          .then((data) => {
            if (data.loggedIn) {
              document.getElementById("user-name").innerText = data.fullname;
              if (data.image)
                document.getElementById("header-avatar").src =
                  `/uploads/${data.image}`;
            }
          });
      }

      function loadActiveItems() {
        // ✅ เรียก API ดึงเฉพาะของที่ยังไม่คืน
        fetch("/api/my-active-borrow")
          .then((res) => res.json())
          .then((data) => {
            const tbody = document.getElementById("active-list");
            tbody.innerHTML = "";

            if (data.length === 0) {
              tbody.innerHTML = `<tr><td colspan="6" align="center" style="padding:30px; color:#999;">
                ✅ ไม่มีอุปกรณ์ค้างส่งคืน<br>
                <small>คุณสามารถยืมอุปกรณ์ใหม่ได้ที่หน้าแรก</small>
              </td></tr>`;
              return;
            }

            data.forEach((item) => {
              const borrowDate = new Date(item.borrowdate).toLocaleDateString(
                "th-TH",
              );
              const dueDate = new Date(item.duedate).toLocaleDateString(
                "th-TH",
              );
              const img = item.image
                ? `/uploads/${item.image}`
                : "/static/default.png";

              // เช็คสถานะ (ถ้า Admin ยังไม่อนุมัติ จะคืนของไม่ได้ หรือจะให้คืนก็ได้แล้วแต่ Policy)
              // ในที่นี้ผมให้กดคืนได้ตลอด เพื่อความสะดวก
              let statusHtml = "";
              let btnAction = "";

              if (item.Due_statusID == 5) {
                // 5 = รออนุมัติ
                statusHtml = `<span class="badge bg-warning">⏳ รออนุมัติ</span>`;
                // รออนุมัติ: ไม่ควรให้กดคืนของ (ซ่อนปุ่ม หรือ disable)
                btnAction = `<button class="btn-return" style="background:#ccc; cursor:not-allowed;" disabled>⏳ รอผล</button>`;
              } else if (item.Due_statusID == 6) {
                // 6 = ไม่อนุมัติ (เพิ่มส่วนนี้)
                statusHtml = `<span class="badge bg-danger">❌ ไม่อนุมัติ</span>`;
                // ไม่อนุมัติ: ให้ปุ่มกดรับทราบ เพื่อลบรายการออก
                btnAction = `<button class="btn-return" style="background:#6c757d;" onclick="acknowledgeItem(${item.TSTID})">🗑️ รับทราบ</button>`;
              } else {
                // อื่นๆ = กำลังใช้งาน
                statusHtml = `<span class="badge bg-info">📦 กำลังใช้งาน</span>`;
                // อนุมัติแล้ว: โชว์ปุ่มคืนของปกติ
                btnAction = `<button class="btn-return" onclick="returnItem(${item.TSTID}, ${item.DVID})">↩️ ส่งคืน</button>`;
              }

              tbody.innerHTML += `
                  <tr>
                      <td><img src="${img}" style="height:50px; border-radius:5px; object-fit:cover;"></td>
                      <td>
                        <strong>${item.devicename}</strong><br>
                        <small style="color:#888">${item.stickerid}</small>
                      </td>
                      <td>${borrowDate}</td>
                      <td style="color:#e74c3c; font-weight:bold;">${dueDate}</td>
                      <td>${statusHtml}</td>
                      <td>
                        ${btnAction}
                      </td>
                  </tr>
              `;
            });
          });
      }

      function acknowledgeItem(tstid) {
        if (!confirm("กดรับทราบเพื่อลบรายการนี้ออกจากหน้าจอ?")) return;

        fetch("/api/acknowledge", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ tstid }),
        })
          .then((res) => res.json())
          .then((data) => {
            if (data.success) {
              loadActiveItems(); // โหลดรายการใหม่ (รายการนี้จะหายไป)
            }
          });
      }

      function returnItem(tstid, dvid) {
        if (!confirm("ยืนยันการส่งคืนอุปกรณ์ใช่หรือไม่?")) return;

        fetch("/api/return", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ tstid, dvid }),
        })
          .then((res) => res.json())
          .then((data) => {
            if (data.success) {
              alert("คืนอุปกรณ์สำเร็จ!");
              loadActiveItems(); // โหลดรายการใหม่ (รายการนี้จะหายไป)
            } else {
              alert("เกิดข้อผิดพลาด: " + (data.message || "ไม่สามารถคืนได้"));
            }
          });
      }
    </script>
  </body>
</html>
