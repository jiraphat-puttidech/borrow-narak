<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>หมวดหมู่ - BORROW SYSTEM</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/index.css" />
    <style>
      .cat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
        padding: 20px 0;
      }
      .cat-card {
        background: white;
        border-radius: 10px;
        padding: 30px;
        text-align: center;
        border: 1px solid #eee;
        transition: 0.2s;
        cursor: pointer;
      }
      .cat-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        border-color: #3498db;
      }
      .cat-icon {
        font-size: 40px;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand-title">BORROW SYSTEM</div>
      <ul class="menu-list">
        <li><a href="/dashboard" class="menu-item">🏠 หน้าหลัก</a></li>
        <li>
          <a href="/tracking" class="menu-item">📦 สถานะการยืม-คืน</a>
        </li>
        <li><a href="/history" class="menu-item">📜 ประวัติทั้งหมด</a></li>
        <li>
          <a href="/category" class="menu-item active">📂 หมวดหมู่สินค้า</a>
        </li>
        <li><a href="/product" class="menu-item">🛍️ สินค้า</a></li>
        <li><a href="/others" class="menu-item">... อื่นๆ</a></li>
      </ul>
      <a href="/logout" class="menu-item logout-link">ออกจากระบบ</a>
    </aside>

    <main class="main-content">
      <header class="header-bar">
        <h1 class="page-title">หมวดหมู่สินค้า</h1>
        <a href="/profile" class="profile-link">
          <div class="user-profile">
            <span class="user-name" id="user-name">Loading...</span>

            <img
              src="/uploads/default.png"
              class="avatar"
              style="
                width: 40px;
                height: 40px;
                border-radius: 50%;
                object-fit: cover;
                margin-left: 10px;
              "
            />
          </div>
        </a>
      </header>

      <div class="cat-grid">
        <div class="cat-card">
          <div class="cat-icon">💻</div>
          <h3>แล็ปท็อป</h3>
          <p style="color: #888">12 รายการ</p>
        </div>
        <div class="cat-card">
          <div class="cat-icon">📷</div>
          <h3>กล้องถ่ายรูป</h3>
          <p style="color: #888">5 รายการ</p>
        </div>
        <div class="cat-card">
          <div class="cat-icon">🔌</div>
          <h3>อุปกรณ์เสริม</h3>
          <p style="color: #888">30 รายการ</p>
        </div>
        <div class="cat-card">
          <div class="cat-icon">📽️</div>
          <h3>โปรเจคเตอร์</h3>
          <p style="color: #888">3 รายการ</p>
        </div>
      </div>
    </main>
    <script src="/static/js/dashboard.js"></script>
  </body>
</html>
