<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>เข้าสู่ระบบ - BORROW SYSTEM</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Kanit:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/static/login.css" />
    <link rel="stylesheet" href="/static/responsive.css" />
  </head>
  <body>
    <div class="left-section">
      <div class="login-container">
        <h2>เข้าสู่ระบบ</h2>
        <p>ยินดีต้อนรับสู่ระบบยืม-คืนอุปกรณ์ Thai PBS</p>

        <div id="msg-box" style="display: none"></div>

        <form action="/login" method="POST">
          <div class="input-group">
            <label>Username</label>
            <input
              type="text"
              name="username"
              placeholder="กรอกชื่อผู้ใช้งาน"
              required
            />
          </div>

          <div class="input-group">
            <label>รหัสผ่าน</label>
            <input
              type="password"
              name="password"
              placeholder="กรอกรหัสผ่าน"
              required
            />
          </div>

          <div class="forgot-password">
            <a href="/forgot">ลืมรหัสผ่าน?</a>
          </div>
          <div
            class="g-recaptcha"
            data-sitekey="6Lfl2p0sAAAAAEJRe4NIzb3C07FDO4T0mBQlXfe3"
            style="margin-bottom: 15px"
          ></div>
          <button type="submit" class="login-btn">เข้าสู่ระบบ</button>
        </form>

        <p
          style="
            margin-top: 25px;
            text-align: left;
            font-size: 14px;
            color: #555;
          "
        >
          ยังไม่มีบัญชี?
          <a
            href="/register"
            style="
              color: var(--primary);
              text-decoration: none;
              font-weight: 600;
              margin-left: 5px;
            "
            >สมัครสมาชิก</a
          >
        </p>

        <div
          class="social-icons"
          style="
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
          "
        >
          <a
            href="https://www.facebook.com/ThaiPBS"
            target="_blank"
            class="social-btn fb"
            style="
              background: #3b5998;
              color: white;
              width: 38px;
              height: 38px;
              border-radius: 50%;
              display: flex;
              align-items: center;
              justify-content: center;
              text-decoration: none;
            "
          >
            <i class="fab fa-facebook-f" style="font-size: 16px"></i>
          </a>

          <a
            href="https://www.thaipbs.or.th/home"
            target="_blank"
            class="social-btn go"
            style="
              background: #db4437;
              color: white;
              width: 38px;
              height: 38px;
              border-radius: 50%;
              display: flex;
              align-items: center;
              justify-content: center;
              text-decoration: none;
            "
          >
            <i class="fab fa-google" style="font-size: 16px"></i>
          </a>

          <a
            href="https://www.twitter.com/ThaiPBS"
            target="_blank"
            class="social-btn tw"
            style="
              background: #1da1f2;
              color: white;
              width: 38px;
              height: 38px;
              border-radius: 50%;
              display: flex;
              align-items: center;
              justify-content: center;
              text-decoration: none;
            "
          >
            <i class="fab fa-twitter" style="font-size: 16px"></i>
          </a>
        </div>
      </div>

      <div class="decorative-circle"></div>
      <div class="decorative-bar"></div>
    </div>

    <div class="right-section">
      <img
        src="/static/images/Thai.png"
        alt="Thai PBS"
        class="hero-image"
        onerror="this.style.display = 'none'"
      />
    </div>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const errorMsg = urlParams.get("error");
      const successMsg = urlParams.get("success");
      const msgBox = document.getElementById("msg-box");

      if (errorMsg) {
        msgBox.style.display = "block";
        msgBox.className = "error-msg";
        msgBox.innerText = errorMsg;
      } else if (successMsg) {
        msgBox.style.display = "block";
        msgBox.className = "success-msg";
        msgBox.innerText = successMsg;
      }
    </script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  </body>
</html>
