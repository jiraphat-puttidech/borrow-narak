<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Borrow History - Admin</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/index.css" />

    <style>
      /* Profile Link */
      .profile-link {
        text-decoration: none;
        color: inherit;
      }
      .user-profile {
        display: flex;
        align-items: center;
        gap: 10px;
        background: white;
        padding: 5px 15px;
        border-radius: 30px;
        border: 1px solid #ddd;
        cursor: pointer;
      }
      .user-profile:hover {
        background-color: #f5f5f5;
      }

      /* Badges สำหรับสถานะ */
      .badge {
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 11px;
        font-weight: bold;
        color: white;
        display: inline-block;
      }
      .bg-wait {
        background: #f39c12;
      } /* รออนุมัติ */
      .bg-borrow {
        background: #e74c3c;
      } /* กำลังยืม */
      .bg-return {
        background: #27ae60;
      } /* คืนแล้ว */
      .bg-reject {
        background: #7f8c8d;
      } /* ไม่อนุมัติ */
    </style>
  </head>
  <body>
    <aside class="sidebar admin-sidebar">
      <div class="brand-title">ADMIN PANEL</div>
      <ul class="menu-list">
        <li><a href="/admin" class="menu-item">📊 ภาพรวมระบบ</a></li>
        <li>
          <a href="/admin/approve" class="menu-item">📝 รายการรออนุมัติ</a>
        </li>
        <li><a href="/admin/device" class="menu-item">📦 จัดการอุปกรณ์</a></li>
        <li>
          <a href="/admin/history" class="menu-item active"
            >📜 ประวัติการยืม-คืน</a
          >
        </li>
        <li><a href="/admin/others" class="menu-item">... อื่นๆ</a></li>
      </ul>
      <a href="/logout" class="menu-item logout-link">ออกจากระบบ</a>
    </aside>

    <main class="main-content">
      <header class="header-bar">
        <div>
          <h1 class="page-title">ประวัติการยืม-คืน</h1>
          <p style="color: #666; font-size: 14px">
            รายการธุรกรรมทั้งหมดที่เกิดขึ้นในระบบ
          </p>
        </div>

        <a href="/profile" class="profile-link">
          <div class="user-profile">
            <span class="user-name" id="user-name">Loading...</span>
            <img
              src="/static/default.png"
              class="avatar"
              id="header-avatar"
              style="
                width: 40px;
                height: 40px;
                border-radius: 50%;
                object-fit: cover;
                margin-left: 10px;
              "
            />
          </div>
        </a>
      </header>

      <div class="dashboard-bottom" style="display: block">
        <div class="panel table-panel" style="width: 100%">
          <div class="panel-header">
            <span>📜 รายการประวัติทั้งหมด</span>
          </div>

          <div class="panel-body">
            <table class="recent-table">
              <thead>
                <tr>
                  <th>เลขที่</th>
                  <th>ผู้ยืม</th>
                  <th>อุปกรณ์</th>
                  <th>วันที่ยืม</th>
                  <th>กำหนดคืน</th>
                  <th>สถานะ</th>
                  <th>คืนเมื่อ</th>
                </tr>
              </thead>
              <tbody id="history-list">
                <tr>
                  <td colspan="7" style="text-align: center; padding: 20px">
                    กำลังโหลดข้อมูล...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        loadHistory();
        loadAdminProfile();
      });

      // โหลดข้อมูลโปรไฟล์ Admin
      function loadAdminProfile() {
        fetch("/api/user")
          .then((res) => res.json())
          .then((data) => {
            if (data.loggedIn) {
              document.getElementById("user-name").innerText = data.fullname;
              const imgEl = document.getElementById("header-avatar");
              if (data.image) imgEl.src = `/uploads/${data.image}`;
              imgEl.onerror = () => {
                imgEl.src = "/static/default.png";
              };
            }
          });
      }

      // โหลดประวัติ
      function loadHistory() {
        const tbody = document.getElementById("history-list");
        fetch("/api/admin/all-history")
          .then((res) => res.json())
          .then((data) => {
            tbody.innerHTML = "";
            if (data.length === 0) {
              tbody.innerHTML =
                "<tr><td colspan='7' style='text-align:center; padding:30px; color:#999;'>🚫 ไม่พบประวัติการทำรายการ</td></tr>";
              return;
            }
            data.forEach((item) => {
              const bDate = new Date(item.borrowdate).toLocaleDateString(
                "th-TH",
              );
              const dDate = new Date(item.duedate).toLocaleDateString("th-TH");

              // จัดการวันที่คืน: ถ้าไม่อนุมัติ (6) ไม่ต้องโชว์วันที่คืน (แม้จะมีค่าจากการกดรับทราบ)
              let rDate = "-";
              if (item.Due_statusID == 6) {
                rDate = `<span style="color:#999; font-size:12px;">(ยกเลิก)</span>`;
              } else if (item.returndate) {
                rDate = new Date(item.returndate).toLocaleDateString("th-TH");
              }

              let badge = "";
              // เช็ค Due_statusID ก่อน เพื่อความแม่นยำ
              if (item.Due_statusID == 5)
                badge = `<span class="badge bg-wait">รออนุมัติ</span>`;
              else if (item.Due_statusID == 6)
                badge = `<span class="badge bg-reject">ไม่อนุมัติ</span>`;
              else if (item.BorrowTransStatusID == 2)
                badge = `<span class="badge bg-borrow">กำลังยืม</span>`;
              else if (item.BorrowTransStatusID == 3)
                badge = `<span class="badge bg-return">คืนแล้ว</span>`;

              const userName = item.fname
                ? `${item.fname} ${item.lname}`
                : item.username;

              tbody.innerHTML += `
                    <tr>
                        <td>#${item.transaction_num || item.TSTID}</td>
                        <td style="font-weight:bold;">${userName}</td>
                        <td>${item.devicename} <span style="color:#999; font-size:12px;">(${item.stickerid})</span></td>
                        <td>${bDate}</td>
                        <td style="color:#e74c3c;">${dDate}</td>
                        <td>${badge}</td>
                        <td>${rDate}</td>
                    </tr>
                `;
            });
          });
      }
    </script>
  </body>
</html>
