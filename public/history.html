<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ประวัติทั้งหมด - BORROW SYSTEM</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/static/index.css" />
    <link rel="stylesheet" href="/static/responsive.css" />
    <style>
      body {
        margin: 0;
        background-color: var(--bg);
        font-family: "Kanit", sans-serif;
        display: flex;
        height: 100vh;
        overflow: hidden;
      }
      .sidebar {
        width: 260px;
        background: var(--surface);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        padding: 24px 0;
        z-index: 10;
      }
      .brand-title {
        font-size: 22px;
        font-weight: 600;
        text-align: center;
        color: var(--primary);
        margin-bottom: 30px;
        letter-spacing: 0.5px;
      }
      .menu-list {
        list-style: none;
        padding: 0;
        margin: 0;
        flex: 1;
      }
      .menu-list li {
        margin: 4px 16px;
      }
      .menu-item {
        display: flex;
        align-items: center;
        padding: 12px 20px;
        color: var(--text-muted);
        text-decoration: none;
        border-radius: 8px;
        font-weight: 400;
        transition: all 0.2s ease;
      }
      .menu-item:hover {
        background: var(--primary-light);
        color: var(--primary);
        transform: translateX(4px);
      }
      .menu-item.active {
        background: var(--primary);
        color: white;
        box-shadow: 0 4px 12px rgba(242, 112, 68, 0.3);
      }
      .logout-link {
        margin: auto 16px 0;
        background: var(--danger-bg);
        color: var(--danger);
        justify-content: center;
        font-weight: 600;
      }
      .logout-link:hover {
        background: var(--danger);
        color: white;
        transform: none;
      }
      .main-content {
        flex: 1;
        padding: 30px 40px;
        overflow-y: auto;
      }
      .header-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--border);
      }
      .page-title {
        margin: 0 0 5px;
        font-size: 28px;
        font-weight: 600;
        color: var(--text-main);
      }
      .user-profile {
        display: flex;
        align-items: center;
        background: var(--surface);
        padding: 8px 16px;
        border-radius: 30px;
        box-shadow: var(--shadow-sm);
        border: 1px solid var(--border);
        transition: 0.2s;
      }
      .user-profile:hover {
        box-shadow: var(--shadow-md);
      }
      .profile-link {
        text-decoration: none;
        color: inherit;
      }
      .user-name {
        font-weight: 500;
        font-size: 15px;
        color: var(--text-main);
        margin-right: 10px;
      }

      .table-panel {
        background: var(--surface);
        border-radius: 16px;
        box-shadow: var(--shadow-md);
        border: 1px solid var(--border);
        overflow: hidden;
      }
      .recent-table {
        width: 100%;
        border-collapse: collapse;
      }
      .recent-table th {
        background: var(--bg);
        padding: 14px 20px;
        text-align: left;
        font-size: 14px;
        color: var(--text-muted);
        font-weight: 600;
        border-bottom: 1px solid var(--border);
      }
      .recent-table td {
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
        font-size: 14px;
        color: var(--text-main);
        vertical-align: middle;
      }
      .recent-table tbody tr:hover {
        background: var(--primary-light);
      }
      .badge {
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        display: inline-block;
      }
      .bg-success {
        background: var(--success-bg);
        color: var(--success);
      }
      .bg-warning {
        background: var(--warning-bg);
        color: var(--warning);
      }
      .bg-danger {
        background: var(--danger-bg);
        color: var(--danger);
      }

      /* ================= Pagination CSS ================= */
      .pagination {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 5px;
        padding: 15px 20px;
        background: var(--surface);
        border-top: 1px solid var(--border);
      }
      .page-btn {
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text-main);
        padding: 6px 12px;
        border-radius: 8px;
        cursor: pointer;
        font-family: "Kanit", sans-serif;
        font-size: 13px;
        font-weight: 500;
        transition: 0.2s;
      }
      .page-btn:hover:not(:disabled) {
        background: #f1f5f9;
        border-color: #94a3b8;
        color: var(--primary);
      }
      .page-btn.active {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
      }
      .page-btn:disabled {
        background: #f8fafc;
        color: #cbd5e1;
        cursor: not-allowed;
      }
      .page-dots {
        color: var(--text-muted);
        padding: 0 5px;
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand-title">BORROW SYSTEM</div>
      <ul class="menu-list">
        <li>
          <a href="/dashboard" class="menu-item"
            ><i class="fas fa-home fa-fw" style="margin-right: 8px"></i
            >หน้าหลัก</a
          >
        </li>
        <li>
          <a href="/tracking" class="menu-item"
            ><i class="fas fa-box fa-fw" style="margin-right: 8px"></i
            >สถานะการยืม-คืน</a
          >
        </li>
        <li>
          <a href="/history" class="menu-item active"
            ><i class="fas fa-history fa-fw" style="margin-right: 8px"></i
            >ประวัติทั้งหมด</a
          >
        </li>
        <li>
          <a href="/product" class="menu-item"
            ><i class="fas fa-laptop fa-fw" style="margin-right: 8px"></i
            >สินค้า</a
          >
        </li>
        <li>
          <a href="/others" class="menu-item"
            ><i class="fas fa-ellipsis-h fa-fw" style="margin-right: 8px"></i
            >อื่นๆ</a
          >
        </li>
      </ul>
      <a href="/logout" class="menu-item logout-link"
        ><i class="fas fa-sign-out-alt fa-fw" style="margin-right: 8px"></i
        >ออกจากระบบ</a
      >
    </aside>

    <main class="main-content">
      <header class="header-bar">
        <div>
          <h1 class="page-title">ประวัติการยืม-คืนทั้งหมด</h1>
          <div style="display: flex; gap: 15px; align-items: center">
            <p style="color: var(--text-muted); font-size: 14px; margin: 0">
              รายการย้อนหลังทั้งหมด (รวมที่คืนแล้ว)
            </p>
            <button
              onclick="exportExcel()"
              style="
                background: #f1f5f9;
                color: #10b981;
                border: 1px solid #10b981;
                padding: 4px 12px;
                border-radius: 6px;
                cursor: pointer;
                font-family: Kanit;
                font-weight: 600;
                font-size: 12px;
              "
            >
              <i class="fas fa-download"></i> โหลดประวัติ (Excel)
            </button>
          </div>
        </div>
        <a href="/profile" class="profile-link">
          <div class="user-profile">
            <span class="user-name" id="user-name">Loading...</span>
            <img
              src="/static/default.png"
              class="avatar"
              id="header-avatar"
              style="
                width: 40px;
                height: 40px;
                border-radius: 50%;
                object-fit: cover;
                margin-left: 10px;
              "
            />
          </div>
        </a>
      </header>

      <div class="table-panel">
        <table class="recent-table">
          <thead>
            <tr>
              <th width="80">รูป</th>
              <th>อุปกรณ์</th>
              <th>วันที่ยืม</th>
              <th>วันที่คืน</th>
              <th>สถานะ</th>
            </tr>
          </thead>
          <tbody id="history-list">
            <tr>
              <td colspan="5" align="center">กำลังโหลดข้อมูล...</td>
            </tr>
          </tbody>
        </table>
        <div id="pagination" class="pagination"></div>
      </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script>
      let myHistoryData = [];
      let currentPage = 1;
      const rowsPerPage = 10;

      document.addEventListener("DOMContentLoaded", () => {
        loadUserProfile();
        loadHistory();
      });

      function loadUserProfile() {
        fetch("/api/user", { cache: "no-store" })
          .then((res) => res.json())
          .then((data) => {
            if (data.loggedIn) {
              document.getElementById("user-name").innerText = data.fullname;
              if (data.image)
                document.getElementById("header-avatar").src =
                  `/uploads/${data.image}`;
            }
          });
      }

      function loadHistory() {
        fetch("/api/my-history-all", { cache: "no-store" })
          .then((res) => res.json())
          .then((data) => {
            myHistoryData = data;
            currentPage = 1;
            renderUserHistoryTable();
          });
      }

      function renderUserHistoryTable() {
        const tbody = document.getElementById("history-list");
        tbody.innerHTML = "";

        if (myHistoryData.length === 0) {
          tbody.innerHTML = `<tr><td colspan="5" align="center" style="padding:30px; color:#999;">ยังไม่มีประวัติการยืม</td></tr>`;
          document.getElementById("pagination").innerHTML = "";
          return;
        }

        const start = (currentPage - 1) * rowsPerPage;
        const end = start + rowsPerPage;
        const paginatedData = myHistoryData.slice(start, end);

        paginatedData.forEach((item) => {
          const borrowDate = new Date(item.borrowdate).toLocaleDateString(
            "th-TH",
          );
          let isOverdue = false;
          if (item.duedate) {
            const dueDateObj = new Date(item.duedate);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            dueDateObj.setHours(0, 0, 0, 0);
            if (today > dueDateObj) isOverdue = true;
          }

          let returnDate = "-";
          if (item.Due_statusID == 6) {
            returnDate = `<span style="color:#ccc;">-</span>`;
          } else if (item.returndate) {
            returnDate = new Date(item.returndate).toLocaleDateString("th-TH");
          }

          const img =
            item.image &&
            item.image !== "default.png" &&
            !item.image.includes("http")
              ? `/uploads/${item.image}`
              : item.image && item.image.includes("http")
                ? item.image
                : "/static/default.png";

          let statusHtml = "";
          if (item.Due_statusID == 6) {
            statusHtml = `<span class="badge bg-danger">❌ ไม่อนุมัติ</span>`;
          } else if (item.BorrowTransStatusID == 3 || item.Due_statusID == 4) {
            statusHtml = `<span class="badge bg-success">✅ คืนแล้ว</span>`;
          } else if (item.Due_statusID == 5) {
            statusHtml = `<span class="badge bg-warning">⏳ รออนุมัติ</span>`;
          } else if (
            item.Due_statusID == 3 ||
            (item.Due_statusID == 2 && isOverdue)
          ) {
            statusHtml = `<span class="badge" style="background:#e74c3c; color:white;">⚠️ เกินกำหนด</span>`;
          } else {
            statusHtml = `<span class="badge" style="background:#cce5ff; color:#004085;">📦 กำลังยืม</span>`;
          }

          tbody.innerHTML += `
              <tr>
                  <td><img src="${img}" style="height:50px; width:50px; border-radius:5px; object-fit:cover;" onerror="this.src='/static/default.png'"></td>
                  <td><strong>${item.devicename}</strong><br><small style="color:#888">${item.stickerid}</small></td>
                  <td>${borrowDate}</td>
                  <td>${returnDate}</td>
                  <td>${statusHtml}</td>
              </tr>
          `;
        });

        renderPagination(
          "pagination",
          myHistoryData.length,
          renderUserHistoryTable,
        );
      }

      function renderPagination(elementId, totalItems, renderCallback) {
        const paginationEl = document.getElementById(elementId);
        paginationEl.innerHTML = "";
        const totalPages = Math.ceil(totalItems / rowsPerPage);
        if (totalPages <= 1) return;

        const createBtn = (text, disabled, onClick, isActive = false) => {
          const btn = document.createElement("button");
          btn.className = `page-btn ${isActive ? "active" : ""}`;
          btn.innerHTML = text;
          btn.disabled = disabled;
          btn.onclick = onClick;
          return btn;
        };

        paginationEl.appendChild(
          createBtn(
            "<i class='fas fa-chevron-left'></i>",
            currentPage === 1,
            () => {
              currentPage--;
              renderCallback();
            },
          ),
        );

        for (let i = 1; i <= totalPages; i++) {
          if (
            i === 1 ||
            i === totalPages ||
            (i >= currentPage - 1 && i <= currentPage + 1)
          ) {
            paginationEl.appendChild(
              createBtn(
                i,
                false,
                () => {
                  currentPage = i;
                  renderCallback();
                },
                i === currentPage,
              ),
            );
          } else if (i === currentPage - 2 || i === currentPage + 2) {
            const dots = document.createElement("span");
            dots.className = "page-dots";
            dots.innerHTML = "...";
            paginationEl.appendChild(dots);
          }
        }

        paginationEl.appendChild(
          createBtn(
            "<i class='fas fa-chevron-right'></i>",
            currentPage === totalPages,
            () => {
              currentPage++;
              renderCallback();
            },
          ),
        );
      }

      function exportExcel() {
        if (myHistoryData.length === 0) return;
        const exportData = myHistoryData.map((item) => ({
          อุปกรณ์: item.devicename,
          รหัสเครื่อง: item.stickerid,
          วันที่ยืม: new Date(item.borrowdate).toLocaleDateString("th-TH"),
          กำหนดคืน: item.duedate
            ? new Date(item.duedate).toLocaleDateString("th-TH")
            : "-",
          วันที่คืนจริง: item.returndate
            ? new Date(item.returndate).toLocaleDateString("th-TH")
            : "ยังไม่คืน",
        }));
        const ws = XLSX.utils.json_to_sheet(exportData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "My_History");
        XLSX.writeFile(
          wb,
          `My_Borrow_History_${new Date().toISOString().split("T")[0]}.xlsx`,
        );
      }
    </script>
    <script src="/static/js/noti.js"></script>
    <script src="/static/js/wow.js"></script>
  </body>
</html>
