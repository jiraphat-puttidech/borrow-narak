<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ประวัติทั้งหมด - BORROW SYSTEM</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/index.css" />
    <style>
      /* สไตล์ตาราง */
      table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        margin-top: 20px;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
      }
      th {
        background-color: #f8f9fa;
        color: #333;
        font-weight: 600;
        padding: 15px;
        text-align: left;
        border-bottom: 2px solid #ddd;
      }
      td {
        padding: 15px;
        border-bottom: 1px solid #eee;
        vertical-align: middle;
        color: #555;
      }
      tr:hover {
        background-color: #f9f9f9;
      }

      /* Badge สถานะ */
      .badge {
        padding: 5px 10px;
        border-radius: 15px;
        font-size: 12px;
        font-weight: 600;
        display: inline-block;
      }
      .bg-success {
        background: #d4edda;
        color: #155724;
      } /* คืนแล้ว */
      .bg-warning {
        background: #fff3cd;
        color: #856404;
      } /* กำลังยืม/รออนุมัติ */
      .bg-danger {
        background: #f8d7da;
        color: #721c24;
      } /* เกินกำหนด (อนาคต) */
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand-title">BORROW SYSTEM</div>
      <ul class="menu-list">
        <li><a href="/dashboard" class="menu-item">🏠 หน้าหลัก</a></li>
        <li><a href="/tracking" class="menu-item">📦 สถานะการยืม-คืน</a></li>
        <li>
          <a href="/history" class="menu-item active">📜 ประวัติทั้งหมด</a>
        </li>
        <li><a href="/category" class="menu-item">📂 หมวดหมู่สินค้า</a></li>
        <li><a href="/product" class="menu-item">🛍️ สินค้า</a></li>
        <li><a href="/others" class="menu-item">... อื่นๆ</a></li>
      </ul>
      <a href="/logout" class="menu-item logout-link">ออกจากระบบ</a>
    </aside>

    <main class="main-content">
      <header class="header-bar">
        <div>
          <h1 class="page-title">ประวัติการยืม-คืนทั้งหมด</h1>
          <p style="color: #666; font-size: 14px">
            รายการย้อนหลังทั้งหมด (รวมที่คืนแล้ว)
          </p>
        </div>

        <a href="/profile" class="profile-link">
          <div class="user-profile">
            <span class="user-name" id="user-name">Loading...</span>
            <img
              src="/static/default.png"
              class="avatar"
              id="header-avatar"
              style="
                width: 40px;
                height: 40px;
                border-radius: 50%;
                object-fit: cover;
                margin-left: 10px;
              "
            />
          </div>
        </a>
      </header>

      <div
        style="
          background: white;
          border-radius: 10px;
          padding: 20px;
          margin-top: 20px;
        "
      >
        <table>
          <thead>
            <tr>
              <th width="80">รูป</th>
              <th>อุปกรณ์</th>
              <th>วันที่ยืม</th>
              <th>วันที่คืน</th>
              <th>สถานะ</th>
            </tr>
          </thead>
          <tbody id="history-list">
            <tr>
              <td colspan="5" align="center">กำลังโหลดข้อมูล...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        loadUserProfile();
        loadHistory();
      });

      function loadUserProfile() {
        fetch("/api/user")
          .then((res) => res.json())
          .then((data) => {
            if (data.loggedIn) {
              document.getElementById("user-name").innerText = data.fullname;
              if (data.image)
                document.getElementById("header-avatar").src =
                  `/uploads/${data.image}`;
            }
          });
      }

      function loadHistory() {
        // ✅ เรียก API ตัวใหม่ (ประวัติทั้งหมด)
        fetch("/api/my-history-all")
          .then((res) => res.json())
          .then((data) => {
            const tbody = document.getElementById("history-list");
            tbody.innerHTML = "";

            if (data.length === 0) {
              tbody.innerHTML = `<tr><td colspan="5" align="center" style="padding:30px; color:#999;">ยังไม่มีประวัติการยืม</td></tr>`;
              return;
            }

            data.forEach((item) => {
              // 1. จัดการวันที่คืน (ถ้ายังไม่คืน ให้ขีด -)
              const borrowDate = new Date(item.borrowdate).toLocaleDateString(
                "th-TH",
              );

              let returnDate = "-";
              if (item.Due_statusID == 6) {
                returnDate = `<span style="color:#ccc;">-</span>`; // ไม่อนุมัติ ไม่ต้องโชว์วันคืน
              } else if (item.returndate) {
                returnDate = new Date(item.returndate).toLocaleDateString(
                  "th-TH",
                );
              }

              // 2. จัดการรูปภาพ
              const img = item.image
                ? `/uploads/${item.image}`
                : "/static/default.png";

              // 3. จัดการสถานะ (Badge)
              let statusHtml = "";
              if (item.Due_statusID == 6) {
                statusHtml = `<span class="badge bg-danger">❌ ไม่อนุมัติ</span>`;
              } else if (item.BorrowTransStatusID == 3) {
                statusHtml = `<span class="badge bg-success">✅ คืนแล้ว</span>`;
              } else if (item.Due_statusID == 5) {
                statusHtml = `<span class="badge bg-warning">⏳ รออนุมัติ</span>`;
              } else {
                statusHtml = `<span class="badge bg-warning">📦 กำลังยืม</span>`;
              }

              // แสดงผล (ไม่มีปุ่มคืนของ)
              tbody.innerHTML += `
                  <tr>
                      <td><img src="${img}" style="height:50px; border-radius:5px; object-fit:cover;"></td>
                      <td>
                        <strong>${item.devicename}</strong><br>
                        <small style="color:#888">${item.stickerid}</small>
                      </td>
                      <td>${borrowDate}</td>
                      <td>${returnDate}</td>
                      <td>${statusHtml}</td>
                  </tr>
              `;
            });
          });
      }
    </script>
  </body>
</html>
