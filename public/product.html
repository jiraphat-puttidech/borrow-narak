<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>สินค้าทั้งหมด - BORROW SYSTEM</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/index.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand-title">BORROW SYSTEM</div>
      <ul class="menu-list">
        <li><a href="/dashboard" class="menu-item">🏠 หน้าหลัก</a></li>
        <li>
          <a href="/tracking" class="menu-item">📦 สถานะการยืม-คืน</a>
        </li>
        <li><a href="/history" class="menu-item">📜 ประวัติทั้งหมด</a></li>
        <li><a href="/category" class="menu-item">📂 หมวดหมู่สินค้า</a></li>
        <li><a href="/product" class="menu-item active">🛍️ สินค้า</a></li>
        <li><a href="/others" class="menu-item">... อื่นๆ</a></li>
      </ul>
      <a href="/logout" class="menu-item logout-link">ออกจากระบบ</a>
    </aside>

    <main class="main-content">
      <header class="header-bar">
        <div>
          <h1 class="page-title">รายการอุปกรณ์</h1>
          <p style="color: #666; font-size: 14px">
            ค้นหาและเลือกอุปกรณ์ที่ต้องการส่งคำขอ
          </p>
        </div>

        <a href="/profile" class="profile-link">
          <div class="user-profile">
            <span class="user-name" id="user-name">Loading...</span>

            <img
              src="/uploads/default.png"
              class="avatar"
              style="
                width: 40px;
                height: 40px;
                border-radius: 50%;
                object-fit: cover;
                margin-left: 10px;
              "
            />
          </div>
        </a>
      </header>

      <div id="device-grid" class="device-grid">
        <p>กำลังโหลดข้อมูล...</p>
      </div>
    </main>

    <div id="borrowModal" class="modal">
      <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2>📝 แบบฟอร์มขอเบิก/ยืม</h2>
        <form id="borrowForm" onsubmit="confirmBorrow(event)">
          <input type="hidden" id="borrow-dvid" />
          <div class="form-group">
            <label>วันที่คืน (Due Date)</label>
            <input type="date" id="borrow-duedate" required />
          </div>
          <div class="form-group">
            <label>สถานที่ใช้งาน</label>
            <input type="text" id="borrow-location" required />
          </div>
          <div class="form-group">
            <label>วัตถุประสงค์</label>
            <textarea id="borrow-purpose" rows="3" required></textarea>
          </div>
          <button type="submit" class="btn-confirm">ยืนยัน</button>
        </form>
      </div>
    </div>

    <script src="/static/js/dashboard.js"></script>
  </body>
</html>
