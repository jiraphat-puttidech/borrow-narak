<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Forgot Password</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/forgot.css" />
  </head>
  <body>
    <div class="forgot-box">
      <h2>🔒 ลืมรหัสผ่าน</h2>
      <p class="subtitle">กรุณากรอก Username และ Email เพื่อรีเซ็ต</p>

      <div id="msg-box" class="msg-box"></div>

      <form action="/reset-password" method="POST" id="resetForm">
        <label>Username *</label>
        <input
          type="text"
          name="username"
          required
          placeholder="ชื่อผู้ใช้งานของคุณ"
        />

        <label>Email ที่ใช้ลงทะเบียน *</label>
        <input
          type="email"
          name="email"
          required
          placeholder="example@thaipbs.or.th"
        />

        <label>ตั้งรหัสผ่านใหม่ *</label>
        <input type="password" name="new_password" id="new_password" required />

        <label>ยืนยันรหัสผ่านใหม่ *</label>
        <input type="password" id="confirm_password" required />

        <p
          id="pass-error"
          style="
            display: none;
            color: #e74c3c;
            font-size: 13px;
            margin: -5px 0 10px;
            font-weight: 600;
          "
        >
          ❌ รหัสผ่านไม่ตรงกัน
        </p>

        <button type="submit">ยืนยันการเปลี่ยนรหัสผ่าน</button>
      </form>

      <div class="back">
        <a href="/">← กลับไปหน้า Login</a>
      </div>
    </div>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const errorMsg = urlParams.get("error");
      const successMsg = urlParams.get("success");
      const msgBox = document.getElementById("msg-box");

      if (errorMsg) {
        msgBox.style.display = "block";
        msgBox.className = "msg-box error-msg";
        msgBox.innerText = errorMsg;
      } else if (successMsg) {
        msgBox.style.display = "block";
        msgBox.className = "msg-box success-msg";
        msgBox.innerText = successMsg;
      }

      const form = document.getElementById("resetForm");
      const newPass = document.getElementById("new_password");
      const confirmPass = document.getElementById("confirm_password");
      const passError = document.getElementById("pass-error");

      form.addEventListener("submit", function (e) {
        if (newPass.value !== confirmPass.value) {
          e.preventDefault();
          passError.style.display = "block";
        } else {
          passError.style.display = "none";
        }
      });

      confirmPass.addEventListener("input", function () {
        passError.style.display = "none";
      });
    </script>
  </body>
</html>
