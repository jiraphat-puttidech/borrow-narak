<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Forgot Password</title>
    <link rel="stylesheet" href="/static/forgot.css" />

    <style>
      .error-msg {
        background-color: #ffe6e6;
        color: #d63031;
        border: 1px solid #d63031;
      }
      .success-msg {
        background-color: #e6fffa;
        color: #00b894;
        border: 1px solid #00b894;
      }
      #msg-box {
        font-weight: bold;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="forgot-box">
      <h2>ลืมรหัสผ่าน</h2>
      <p class="subtitle">กรอกข้อมูลเพื่อตั้งรหัสผ่านใหม่</p>

      <div
        id="msg-box"
        style="
          display: none;
          padding: 15px;
          margin-bottom: 20px;
          text-align: center;
          border-radius: 5px;
        "
      ></div>

      <form id="resetForm" method="POST" action="/reset-password">
        <label>Username</label>
        <input
          type="text"
          name="username"
          required
          placeholder="ชื่อผู้ใช้งานของคุณ"
        />

        <label>Email ที่ลงทะเบียนไว้</label>
        <input
          type="email"
          name="email"
          required
          placeholder="เช่น admin@example.com"
        />

        <label>รหัสผ่านใหม่</label>
        <input
          type="password"
          name="new_password"
          id="new_password"
          required
          placeholder="ตั้งรหัสใหม่"
        />

        <label>Confirm Password (ยืนยันรหัสผ่าน)</label>
        <input
          type="password"
          name="confirm_password"
          id="confirm_password"
          required
          placeholder="กรอกรหัสผ่านอีกครั้ง"
        />

        <p
          id="pass-error"
          style="
            color: red;
            display: none;
            font-size: 14px;
            margin-top: -10px;
            margin-bottom: 10px;
          "
        >
          ❌ รหัสผ่านไม่ตรงกัน กรุณากรอกใหม่
        </p>
        <button type="submit">บันทึกรหัสผ่านใหม่</button>
      </form>

      <div class="back">
        <a href="/">← กลับไปหน้า Login</a>
      </div>
    </div>

    <script>
      // โค้ดเดิม: จัดการ Error/Success จาก Server
      const urlParams = new URLSearchParams(window.location.search);
      const errorMsg = urlParams.get("error");
      const successMsg = urlParams.get("success");
      const msgBox = document.getElementById("msg-box");

      if (errorMsg) {
        msgBox.style.display = "block";
        msgBox.className = "msg-box error-msg";
        msgBox.innerText = errorMsg;
      } else if (successMsg) {
        msgBox.style.display = "block";
        msgBox.className = "msg-box success-msg";
        msgBox.innerText = successMsg;
      }

      // โค้ดใหม่: เช็คว่ารหัสตรงกันไหมก่อนส่งฟอร์ม
      const form = document.getElementById("resetForm");
      const newPass = document.getElementById("new_password");
      const confirmPass = document.getElementById("confirm_password");
      const passError = document.getElementById("pass-error");

      form.addEventListener("submit", function (e) {
        if (newPass.value !== confirmPass.value) {
          e.preventDefault(); // ห้ามส่งฟอร์ม
          passError.style.display = "block"; // โชว์ข้อความ Error
        } else {
          passError.style.display = "none";
        }
      });

      // (เสริม) พิมพ์ใหม่แล้วซ่อน Error
      confirmPass.addEventListener(
        "input",
        () => (passError.style.display = "none"),
      );
    </script>
  </body>
</html>
