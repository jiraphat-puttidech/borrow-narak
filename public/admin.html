<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Dashboard - BORROW SYSTEM</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/admin.css" />
  </head>

  <body>
    <!-- SIDEBAR -->
    <aside class="sidebar admin">
      <div class="brand-title">ADMIN PANEL</div>

      <ul class="menu-list">
        <li><a href="/admin" class="menu-item active">ภาพรวมระบบ</a></li>
        <li><a href="/admin/users" class="menu-item">จัดการผู้ใช้</a></li>
        <li><a href="/admin/products" class="menu-item">จัดการอุปกรณ์</a></li>
        <li><a href="/admin/borrow" class="menu-item">รายการยืม-คืน</a></li>
        <li><a href="/admin/report" class="menu-item">รายงาน</a></li>
      </ul>

      <a href="/logout" class="menu-item logout-link">ออกจากระบบ</a>
    </aside>

    <!-- MAIN -->
    <main class="main-content">
      <header class="header-bar">
        <div>
          <h1 class="page-title">แดชบอร์ดผู้ดูแลระบบ</h1>
          <p class="subtitle">ภาพรวมสถานะของระบบยืมอุปกรณ์</p>
        </div>

        <div class="user-profile admin">
          <span class="user-name">ADMIN</span>
          <img
            src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
            class="avatar"
          />
        </div>
      </header>

      <!-- SUMMARY CARDS -->
      <section class="summary-grid">
        <div class="summary-card">
          <h3>👤 ผู้ใช้ทั้งหมด</h3>
          <p class="number">128</p>
        </div>

        <div class="summary-card">
          <h3>📦 อุปกรณ์ทั้งหมด</h3>
          <p class="number">56</p>
        </div>

        <div class="summary-card">
          <h3>📄 กำลังถูกยืม</h3>
          <p class="number warning">12</p>
        </div>

        <div class="summary-card">
          <h3>✅ คืนแล้ววันนี้</h3>
          <p class="number success">8</p>
        </div>
      </section>
    </main>
  </body>
</html>
