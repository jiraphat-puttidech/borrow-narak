<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ลงทะเบียนพนักงาน - Borrow System</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/register.css" />
  </head>
  <body>
    <div class="register-box">
      <h2>📝 สมัครสมาชิกใหม่</h2>
      <div id="msg-box" style="display: none"></div>

      <form
        id="regForm"
        method="POST"
        action="/register"
        enctype="multipart/form-data"
      >
        <div style="text-align: center; margin-bottom: 20px">
          <label style="display: block; margin-bottom: 10px">รูปโปรไฟล์</label>
          <input
            type="file"
            name="image"
            accept="image/*"
            required
            class="input-file"
          />
        </div>

        <label>รหัสพนักงาน (EMP_NUM)</label>
        <input type="text" name="emp_num" required placeholder="เช่น 6601001" />

        <div class="input-group">
          <div class="input-wrapper">
            <label>ชื่อจริง</label>
            <input type="text" name="fname" required />
          </div>
          <div class="input-wrapper">
            <label>นามสกุล</label>
            <input type="text" name="lname" required />
          </div>
        </div>

        <div class="input-group">
          <div class="input-wrapper">
            <label>สำนัก (Institution)</label>
            <select name="institution_id" required>
              <option value="1">1 : ไม่มีสำนัก</option>
              <option value="2">2 : สำนักสื่อดิจิทัล</option>
              <option value="3">3 : สำนักโทรทัศน์และวิทยุ</option>
              <option value="4">4 : สำนักบริหาร</option>
              <option value="5">5 : สำนักวิศวกรรม</option>
              <option value="6">6 : สำนักทรัพยากรมนุษย์</option>
              <option value="7">7 : สำนักตรวจสอบภายใน</option>
              <option value="8">8 : สำนักสร้างสรรค์เนื้อหา</option>
              <option value="9">9 : สำนักข่าว</option>
              <option value="10">
                10 : สำนักเครือข่ายและการมีส่วนร่วมสาธารณะ
              </option>
              <option value="11">11 : คณะกรรมการนโยบาย</option>
              <option value="12">12 : คณะกรรมการบริหาร</option>
            </select>
          </div>
          <div class="input-wrapper">
            <label>ฝ่าย (Department)</label>
            <select name="department_id" required>
              <option value="1">1 : ไม่มีฝ่าย</option>
              <option value="2">2 : ฝ่ายเทคโนโลยีสารสนเทศ</option>
              <option value="3">3 : ฝ่ายบริหารความเสี่ยงและธรรมาภิบาล</option>
              <option value="4">4 : ฝ่ายยุทธศาสตร์องค์การ</option>
              <option value="5">5 : ฝ่ายสนับสนุนคณะกรรมการและผู้บริหาร</option>
              <option value="6">6 : ศูนย์การเงิน</option>
              <option value="7">
                7 : ศูนย์สื่อสารวาระทางสังคมและนโยบายสาธารณะ
              </option>
              <option value="8">8 : ศูนย์ Thai PBS World</option>
              <option value="9">9 : ศูนย์วิจัยและพัฒนาสื่อสาธารณะ</option>
              <option value="10">
                10 : ศูนย์สื่อสารและส่งเสริมการตลาดเพื่อสาธารณะ
              </option>
              <option value="11">11 : ศูนย์พัฒนานวัตกรรมสื่อสาธารณะ</option>
              <option value="12">12 : ศูนย์พัฒนาระบบงานสารสนเทศ</option>
              <option value="13">
                13 : ศูนย์สื่อสาธารณะเพื่อเด็กและการเรียนรู้
              </option>
              <option value="14">14 : ศูนย์สื่อศิลปวัฒนธรรม</option>
              <option value="15">
                15 : หน่วยสนับสนุนสภาผู้ชมและผู้ฟังรายการ
              </option>
            </select>
          </div>
        </div>

        <input type="hidden" name="role_id" value="1" />

        <div class="input-group">
          <div class="input-wrapper">
            <label>Email</label>
            <input type="email" name="email" required />
          </div>
          <div class="input-wrapper">
            <label>เบอร์โทรศัพท์</label>
            <input
              type="tel"
              name="phone"
              placeholder="ตัวเลข 10 หลัก (ไม่ต้องมีขีด)"
              required
              maxlength="10"
              pattern="[0-9]{10}"
              title="กรุณากรอกเบอร์โทรศัพท์เป็นตัวเลข 10 หลัก"
              oninput="this.value = this.value.replace(/[^0-9]/g, '')"
            />
          </div>
        </div>

        <hr />

        <label>Username</label>
        <input type="text" name="username" required />

        <label
          >Password
          <span style="font-size: 12px; color: #666"
            >(อย่างน้อย 8 ตัวอักษร ประกอบด้วย A-Z, a-z, 0-9
            และสัญลักษณ์พิเศษ)</span
          ></label
        >
        <input type="password" name="password" id="password" required />

        <p
          id="strong-error"
          style="
            color: red;
            display: none;
            font-size: 13px;
            margin-top: -10px;
            margin-bottom: 10px;
          "
        >
          ❌ รหัสผ่านต้องมีอย่างน้อย 8 ตัวอักษร มีตัวพิมพ์ใหญ่ พิมพ์เล็ก ตัวเลข
          และสัญลักษณ์ (เช่น - / @ !)
        </p>

        <label>Confirm Password (ยืนยันรหัสผ่าน)</label>
        <input
          type="password"
          name="confirm_password"
          id="confirm_password"
          required
          placeholder="กรอกรหัสผ่านอีกครั้ง"
        />

        <p
          id="pass-error"
          style="
            color: red;
            display: none;
            font-size: 13px;
            margin-top: -10px;
            margin-bottom: 10px;
          "
        >
          ❌ รหัสผ่านไม่ตรงกัน กรุณากรอกใหม่
        </p>

        <div
          class="g-recaptcha"
          data-sitekey="6Lfl2p0sAAAAAEJRe4NIzb3C07FDO4T0mBQlXfe3"
          style="margin-bottom: 15px"
        ></div>

        <button type="submit">สมัครสมาชิก</button>
      </form>

      <div class="back">
        <a href="/">← กลับไปหน้า Login</a>
      </div>
    </div>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const errorMsg = urlParams.get("error");
      const successMsg = urlParams.get("success");
      const msgBox = document.getElementById("msg-box");

      if (errorMsg) {
        msgBox.style.display = "block";
        msgBox.className = "error-msg";
        msgBox.innerText = errorMsg;
      } else if (successMsg) {
        msgBox.style.display = "block";
        msgBox.className = "success-msg";
        msgBox.innerText = successMsg;
      }

      // ✅ 4. Script ตรวจสอบรหัสผ่านก่อนกดส่ง (อัปเกรดความปลอดภัย)
      document
        .getElementById("regForm")
        .addEventListener("submit", function (e) {
          const pass = document.getElementById("password").value;
          const confirm = document.getElementById("confirm_password").value;
          const errorText = document.getElementById("pass-error");
          const strongErrorText = document.getElementById("strong-error");

          // กฎของรหัสผ่าน: ยาว 8+, พิมพ์ใหญ่ 1, พิมพ์เล็ก 1, ตัวเลข 1, สัญลักษณ์ 1
          const strongRegex = new RegExp(
            "^(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.*[!@#$%^&*_=+\\-//]).{8,}$",
          );

          let isValid = true;

          // 1. เช็กความยากของรหัสผ่าน
          if (!strongRegex.test(pass)) {
            strongErrorText.style.display = "block";
            isValid = false;
          } else {
            strongErrorText.style.display = "none";
          }

          // 2. เช็กรหัสผ่านตรงกันไหม
          if (pass !== confirm) {
            errorText.style.display = "block";
            isValid = false;
          } else {
            errorText.style.display = "none";
          }

          // ถ้าไม่ผ่านกฎข้อใดข้อหนึ่ง ให้ระงับการส่งฟอร์ม
          if (!isValid) {
            e.preventDefault();
          }
        });
    </script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  </body>
</html>
